<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - escola.buss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #4c72ff 0%, #7f6dff 50%, #8c90ff 100%);
            color: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 35%),
                              radial-gradient(circle at bottom right, rgba(255,255,255,0.12), transparent 30%);
        }

        .login-shell {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(13, 20, 62, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        .login-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 28px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }

        .login-header p {
            margin: 0;
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.96rem;
        }

        .login-form {
            display: grid;
            gap: 16px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 12px 16px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .input-group:focus-within {
            border-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .input-group i {
            margin-right: 12px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.72);
            width: 20px;
            text-align: center;
        }

        .input-group input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            color: #ffffff;
            font-size: 1rem;
            padding: 8px 0;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .login-button {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #ffd166 0%, #ff9a56 100%);
            color: #09152a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.25s ease;
            box-shadow: 0 18px 30px rgba(255, 148, 63, 0.28);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 36px rgba(255, 148, 63, 0.32);
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .error {
            display: none;
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255, 88, 105, 0.16);
            border: 1px solid rgba(255, 88, 105, 0.34);
            color: #ffccd5;
            font-size: 0.95rem;
            text-align: center;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.72);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 360px) {
            .login-shell {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-header">
            <h1>escola.buss</h1>
            <p>Faça login para acessar o mapa de rastreamento de ônibus escolar.</p>
        </div>

        <form id="loginForm" class="login-form">
            <label class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Usuário" required autocomplete="username">
            </label>

            <label class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Senha" required autocomplete="current-password">
            </label>

            <button type="submit" class="login-button">Entrar</button>
        </form>

        <div id="errorMessage" class="error">Por favor, preencha todos os campos.</div>

        <div class="footer-note">Acesso rápido e seguro para sua equipe escolar.</div>
    </div>

    <script>
        if (localStorage.getItem('escolaBussLoggedIn') === 'true') {
            window.location.replace('index.html');
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            if (username === '' || password === '') {
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            localStorage.setItem('escolaBussLoggedIn', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
